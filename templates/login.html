<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Booking - Login/Register</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header>
        <h1>Event Ticket Booking System</h1>
    </header>
    <main>
        <div class="container">
            <div class="card">
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
                {% endif %}
                {% endwith %}
                <div class="tab-buttons">
                    <button id="login-tab" class="tab active">Login</button>
                    <button id="register-tab" class="tab">Register</button>
                </div>
                <form id="login-form" class="form active" action="/login" method="post">
                    <h2>Login</h2>
                    <div class="form-group">
                        <label for="login-email">Email:</label>
                        <input type="email" id="login-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password:</label>
                        <input type="password" id="login-password" name="password" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
                <form id="register-form" class="form" action="/register" method="post">
                    <h2>Register</h2>
                    <div class="form-group">
                        <label for="register-name">Name:</label>
                        <input type="text" id="register-name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email:</label>
                        <input type="email" id="register-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password:</label>
                        <input type="password" id="register-password" name="password" required>
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
            </div>
        </div>
    </main>
    <script src="../static/script.js"></script>
</body>
</html>
