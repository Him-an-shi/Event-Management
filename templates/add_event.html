<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Booking - Add Event</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header>
        <h1>Event Ticket Booking System</h1>
        <nav>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/events" class="nav-link">View Events</a>
            <a href="/add_event" class="nav-link active">Add Event</a>
            <a href="/bookings" class="nav-link">My Bookings</a>
            <a href="/logout" class="nav-link">Logout</a>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="card">
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="flash">{{ messages[0] }}</div>
                {% endif %}
                {% endwith %}
                <h2>Add New Event</h2>
                <form id="add-event-form" class="form" method="post">
                    <div class="form-group">
                        <label for="event-name">Event Name:</label>
                        <input type="text" id="event-name" name="eventName" required>
                    </div>
                    <div class="form-group">
                        <label for="event-date">Date:</label>
                        <input type="date" id="event-date" name="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label for="event-venue">Venue:</label>
                        <input type="text" id="event-venue" name="eventVenue" required>
                    </div>
                    <div class="form-group">
                        <label for="total-seats">Total Seats:</label>
                        <input type="number" id="total-seats" name="totalSeats" min="1" required>
                    </div>
                    <button type="submit" class="btn">Add Event</button>
                </form>
            </div>
        </div>
    </main>
    <script src="../static/script.js"></script>
</body>
</html>
